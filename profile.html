<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NexLify – Thông Tin Cá Nhân</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sidebar-w: 210px; --topbar-h: 52px;
  --blue: #3b82f6; --blue-light: #dbeafe; --blue-pale: #eff6ff;
  --purple: #7c3aed; --purple-light: #ede9fe;
  --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
  --gray-400: #94a3b8; --gray-500: #64748b; --gray-700: #334155; --gray-900: #0f172a;
  --white: #ffffff; --success: #16a34a; --success-bg: #dcfce7;
}
body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--gray-50); color: var(--gray-900); font-size: 13px; display: flex; min-height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); background: var(--white); border-right: 1px solid var(--gray-200); position: fixed; top: 0; left: 0; bottom: 0; display: flex; flex-direction: column; z-index: 100; padding: 0 10px; overflow-y: auto; }
.sidebar-logo { padding: 16px 8px 14px; border-bottom: 1px solid var(--gray-100); margin-bottom: 6px; text-align: center; }
.logo-info strong { display: block; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 17px; line-height: 1.3; letter-spacing: 1px; background: linear-gradient(135deg, #e879f9 0%, #818cf8 50%, #38bdf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.logo-info small { font-size: 10px; color: var(--gray-400); font-weight: 400; }
.section-label { font-size: 10px; font-weight: 700; color: var(--gray-400); letter-spacing: .8px; text-transform: uppercase; padding: 10px 8px 4px; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: 7px; color: var(--gray-500); font-size: 12.5px; font-weight: 500; cursor: pointer; transition: all .15s; text-decoration: none; margin-bottom: 2px; }
.nav-item:hover { background: var(--blue-pale); color: var(--blue); }
.nav-item.active { background: var(--blue-light); color: var(--blue); font-weight: 600; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.nav-parent { display: flex; align-items: center; justify-content: space-between; }
.nav-parent .nav-left { display: flex; align-items: center; gap: 9px; }
.nav-arrow { width: 13px; height: 13px; flex-shrink: 0; transition: transform .2s; color: var(--gray-400); }
.nav-parent.open .nav-arrow { transform: rotate(180deg); }
.nav-sub { display: none; padding-left: 10px; }
.nav-sub.open { display: block; }
.nav-sub .nav-item { font-size: 12px; padding: 5px 10px; margin-bottom: 1px; }

/* TOPBAR */
.topbar { position: fixed; top: 0; left: var(--sidebar-w); right: 0; height: var(--topbar-h); background: var(--white); border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; padding: 0 20px; z-index: 90; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.notif-btn { width: 30px; height: 30px; border: none; background: transparent; border-radius: 7px; cursor: pointer; color: var(--gray-400); display: flex; align-items: center; justify-content: center; position: relative; }
.notif-btn svg { width: 15px; height: 15px; }
.notif-dot { position: absolute; top: 5px; right: 6px; width: 6px; height: 6px; border-radius: 50%; background: #ef4444; border: 1.5px solid white; }
.profile-btn { display: flex; align-items: center; gap: 6px; background: var(--gray-100); border-radius: 20px; padding: 3px 10px 3px 3px; cursor: pointer; border: none; font-family: inherit; }
.profile-avatar { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, #60a5fa, #3b82f6); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; }
.profile-btn .p-name { font-size: 12px; font-weight: 600; color: var(--gray-700); }
.profile-btn svg { width: 10px; height: 10px; color: var(--gray-400); }

/* Profile Dropdown */
.profile-dropdown { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: var(--white); border: 1px solid var(--gray-200); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.12); min-width: 200px; z-index: 200; overflow: hidden; }
.profile-dropdown.open { display: block; }
.profile-dropdown-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; font-size: 13px; font-weight: 500; color: var(--gray-700); cursor: pointer; transition: background .13s; border-bottom: 1px solid var(--gray-100); text-decoration: none; }
.profile-dropdown-item:last-child { border-bottom: none; }
.profile-dropdown-item:hover { background: var(--blue-pale); color: var(--blue); }
.profile-dropdown-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.profile-dropdown-item.danger:hover { background: #fee2e2; color: #dc2626; }

/* MAIN */
.main { margin-left: var(--sidebar-w); margin-top: var(--topbar-h); padding: 20px 24px; flex: 1; height: calc(100vh - var(--topbar-h)); overflow-y: auto; }

/* PAGE HEADER */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.page-title { font-size: 20px; font-weight: 700; color: var(--gray-900); }

/* PROFILE LAYOUT */
.profile-layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }

/* PROFILE CARD */
.profile-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.profile-avatar-large { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #60a5fa, #3b82f6); display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 700; color: white; margin: 0 auto 16px; }
.profile-name { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 4px; }
.profile-role { font-size: 13px; color: var(--gray-400); text-align: center; margin-bottom: 20px; }
.profile-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-top: 20px; border-top: 1px solid var(--gray-100); }
.profile-stat { text-align: center; }
.profile-stat-value { font-size: 20px; font-weight: 700; color: var(--blue); }
.profile-stat-label { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

/* FORM */
.form-section { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.04); margin-bottom: 16px; }
.form-section:last-child { margin-bottom: 0; }
.form-section-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--gray-100); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.form-row:last-child { margin-bottom: 0; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--gray-700); }
.form-input { border: 1.5px solid var(--gray-200); border-radius: 8px; padding: 9px 12px; font-family: inherit; font-size: 13px; color: var(--gray-900); outline: none; transition: border-color .15s; }
.form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
.form-input:disabled { background: var(--gray-50); color: var(--gray-400); cursor: not-allowed; }
.form-textarea { border: 1.5px solid var(--gray-200); border-radius: 8px; padding: 9px 12px; font-family: inherit; font-size: 13px; color: var(--gray-900); outline: none; transition: border-color .15s; resize: vertical; min-height: 80px; }
.form-textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }

/* BUTTONS */
.btn { border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 7px; transition: all .15s; }
.btn svg { width: 14px; height: 14px; }
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: #2563eb; }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #15803d; }
.btn-ghost { background: var(--white); border: 1px solid var(--gray-200); color: var(--gray-700); }
.btn-ghost:hover { border-color: var(--blue); color: var(--blue); }

/* USER LIST */
.user-list { display: flex; flex-direction: column; gap: 10px; }
.user-item { display: flex; align-items: center; gap: 12px; padding: 14px; border: 1px solid var(--gray-200); border-radius: 8px; background: var(--gray-50); transition: all .15s; }
.user-item:hover { border-color: var(--blue); background: var(--blue-pale); }
.user-item-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #60a5fa, #3b82f6); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: white; flex-shrink: 0; }
.user-item-info { flex: 1; }
.user-item-name { font-size: 13px; font-weight: 600; color: var(--gray-900); margin-bottom: 2px; }
.user-item-email { font-size: 11px; color: var(--gray-400); }
.user-item-role { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.role-admin { background: #dbeafe; color: #1e40af; }
.role-manager { background: #dcfce7; color: #15803d; }
.role-staff { background: #fef3c7; color: #a16207; }
.user-item-actions { display: flex; gap: 6px; }
.btn-icon { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.btn-icon svg { width: 14px; height: 14px; }
.btn-icon.edit { background: var(--blue-pale); color: var(--blue); }
.btn-icon.edit:hover { background: var(--blue); color: white; }
.btn-icon.delete { background: #fee2e2; color: #dc2626; }
.btn-icon.delete:hover { background: #dc2626; color: white; }

/* MODAL */
.modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 999; align-items: center; justify-content: center; }
.modal.open { display: flex; }
.modal-content { background: var(--white); border-radius: 12px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; color: var(--gray-400); display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: all .15s; }
.modal-close:hover { background: var(--gray-100); color: var(--gray-700); }
.modal-close svg { width: 18px; height: 18px; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; justify-content: flex-end; }

/* PERMISSION CHECKBOXES */
.permission-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
.permission-item { display: flex; align-items: center; gap: 8px; padding: 10px; border: 1px solid var(--gray-200); border-radius: 6px; cursor: pointer; transition: all .15s; }
.permission-item:hover { border-color: var(--blue); background: var(--blue-pale); }
.permission-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
.permission-item label { font-size: 12px; font-weight: 500; color: var(--gray-700); cursor: pointer; flex: 1; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: white; border-radius: 8px; padding: 8px 16px; font-size: 12px; font-weight: 500; z-index: 999; display: none; align-items: center; gap: 6px; box-shadow: 0 4px 20px rgba(0,0,0,.2); }
.toast.show { display: flex; }
.toast.success { background: var(--success); }
</style>
</head>

        <span class="p-name">Admin</span>

<main class="main">
  <div class="page-header">
    <div class="page-title">Thông Tin Cá Nhân</div>
  </div>

  <div class="profile-layout">
    <!-- LEFT: Profile Card -->

        <div class="profile-avatar-large">A</div>
        <div class="profile-name">Admin</div>
        <div class="profile-role">Quản trị viên</div>
        <div class="profile-stats">

            <div class="profile-stat-value">30</div>
            <div class="profile-stat-label">Đơn hàng</div>
          </div>
          <div class="profile-stat">

            <div class="profile-stat-label">Báo giá</div>

        </div>
      </div>
    </div>

            <label class="form-label">Họ và tên</label>
            <input class="form-input" id="fullname" value="Admin" />
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" id="email" value="admin@nexlify.com" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Số điện thoại</label>
            <input class="form-input" id="phone" value="0901 234 567" />

          <div class="form-group">
            <label class="form-label">Chức vụ</label>
            <input class="form-input" id="role" value="Quản trị viên" disabled />

        </div>
        <div class="form-group">
          <label class="form-label">Địa chỉ</label>
          <input class="form-input" id="address" value="123 Quốc lộ 1A, Vĩnh Long" />
        </div>
      </div>

      <!-- Đổi mật khẩu -->
      <div class="form-section">
        <div class="form-section-title">Đổi mật khẩu</div>

          <input class="form-input" type="password" id="current-password" placeholder="Nhập mật khẩu hiện tại" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Mật khẩu mới</label>
            <input class="form-input" type="password" id="new-password" placeholder="Nhập mật khẩu mới" />

            <label class="form-label">Xác nhận mật khẩu mới</label>

          Lưu thay đổi
        </button>

</main>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg"></span>
</div>

<!-- USER MODAL -->
<div class="modal" id="userModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="userModalTitle">Thêm người dùng mới</div>
      <button class="modal-close" onclick="closeUserModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editUserId" />
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Họ và tên</label>
          <input class="form-input" id="userName" placeholder="Nhập họ và tên" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="userEmail" placeholder="Nhập email" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Số điện thoại</label>
          <input class="form-input" id="userPhone" placeholder="Nhập số điện thoại" />
        </div>
        <div class="form-group">
          <label class="form-label">Chức vụ</label>
          <select class="form-input" id="userRole">
            <option value="admin">Quản trị viên</option>
            <option value="manager">Quản lý</option>
            <option value="staff">Nhân viên</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Mật khẩu</label>
        <input class="form-input" type="password" id="userPassword" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)" />
      </div>
      <div class="form-group">
        <label class="form-label">Phân quyền truy cập</label>
        <div class="permission-grid">
          <div class="permission-item">
            <input type="checkbox" id="perm-quotes" checked />
            <label for="perm-quotes">Báo giá</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="perm-orders" checked />
            <label for="perm-orders">Đơn hàng</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="perm-invoices" checked />
            <label for="perm-invoices">Hóa đơn</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="perm-customers" checked />
            <label for="perm-customers">Khách hàng</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="perm-products" checked />
            <label for="perm-products">Sản phẩm</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="perm-reports" checked />
            <label for="perm-reports">Báo cáo</label>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeUserModal()">Hủy bỏ</button>
      <button class="btn btn-primary" onclick="saveUser()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Lưu
      </button>
    </div>
  </div>
</div>

<script>
// Current user data
const currentUser = {
  id: 1,
  name: 'Admin',
  email: 'admin@nexlify.com',
  role: 'admin'
};

// Sample user database
let users = [
  { id: 1, name: 'Admin', email: 'admin@nexlify.com', phone: '0901 234 567', role: 'admin', permissions: ['quotes', 'orders', 'invoices', 'customers', 'products', 'reports'] },
  { id: 2, name: 'Phạm Thị Lan', email: 'phamthilan@nexlify.com', phone: '0903 456 789', role: 'staff', permissions: ['quotes', 'orders', 'customers'] },
  { id: 3, name: 'Trần Thị Hương', email: 'tranthihuong@nexlify.com', phone: '0904 567 890', role: 'staff', permissions: ['quotes', 'orders', 'customers'] },
  { id: 4, name: 'Lê Văn Tùng', email: 'levantung@nexlify.com', phone: '0905 678 901', role: 'staff', permissions: ['quotes', 'orders', 'customers'] },
  { id: 5, name: 'Nguyễn Văn Minh', email: 'nguyenvanminh@nexlify.com', phone: '0906 789 012', role: 'staff', permissions: ['quotes', 'orders', 'customers'] }
];

function toggleNav(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function toggleProfileDropdown() {
  const dropdown = document.getElementById('profileDropdown');
  if (dropdown) {
    dropdown.classList.toggle('open');
  }
}

document.addEventListener('click', function(event) {
  const profileBtn = event.target.closest('.profile-btn');
  const dropdown = document.getElementById('profileDropdown');
  
  if (dropdown && !profileBtn && !dropdown.contains(event.target)) {
    dropdown.classList.remove('open');
  }
});

function logout() {
  if (confirm('Bạn có chắc muốn đăng xuất?')) {
    window.location.href = 'login.html';
  }
}

function saveProfile() {
  const fullname = document.getElementById('fullname').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  const address = document.getElementById('address').value;
  
  const currentPassword = document.getElementById('current-password').value;
  const newPassword = document.getElementById('new-password').value;
  const confirmPassword = document.getElementById('confirm-password').value;
  
  // Validate
  if (!fullname || !email || !phone) {
    alert('Vui lòng điền đầy đủ thông tin bắt buộc!');
    return;
  }
  
  // Check password if changing
  if (newPassword || confirmPassword) {
    if (!currentPassword) {
      alert('Vui lòng nhập mật khẩu hiện tại!');
      return;
    }
    if (newPassword !== confirmPassword) {
      alert('Mật khẩu mới không khớp!');
      return;
    }
    if (newPassword.length < 6) {
      alert('Mật khẩu mới phải có ít nhất 6 ký tự!');
      return;
    }
  }
  
  // Save (simulate)
  showToast('✓ Thông tin đã được cập nhật thành công!');
  
  // Clear password fields
  document.getElementById('current-password').value = '';
  document.getElementById('new-password').value = '';
  document.getElementById('confirm-password').value = '';
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  toastMsg.textContent = msg;
  toast.classList.add('show', 'success');
  setTimeout(() => {
    toast.classList.remove('show', 'success');
  }, 3000);
}

// User Management Functions
function initUserManagement() {
  // Show/hide permission section based on role
  const permissionSection = document.getElementById('permissionSection');
  if (currentUser.role !== 'admin') {
    permissionSection.style.display = 'none';
  } else {
    renderUserList();
  }
}

function renderUserList() {
  const userList = document.getElementById('userList');
  if (!userList) return;
  
  userList.innerHTML = users.map(user => {
    const initial = user.name.charAt(0).toUpperCase();
    const roleClass = `role-${user.role}`;
    const roleText = user.role === 'admin' ? 'Quản trị viên' : user.role === 'manager' ? 'Quản lý' : 'Nhân viên';
    
    return `
      <div class="user-item">
        <div class="user-item-avatar">${initial}</div>
        <div class="user-item-info">
          <div class="user-item-name">${user.name}</div>
          <div class="user-item-email">${user.email}</div>
        </div>
        <div class="user-item-role ${roleClass}">${roleText}</div>
        <div class="user-item-actions">
          <button class="btn-icon edit" onclick="editUser(${user.id})" title="Chỉnh sửa">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          ${user.id !== currentUser.id ? `
          <button class="btn-icon delete" onclick="deleteUser(${user.id})" title="Xóa">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
          ` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function openAddUserModal() {
  document.getElementById('userModalTitle').textContent = 'Thêm người dùng mới';
  document.getElementById('editUserId').value = '';
  document.getElementById('userName').value = '';
  document.getElementById('userEmail').value = '';
  document.getElementById('userPhone').value = '';
  document.getElementById('userRole').value = 'staff';
  document.getElementById('userPassword').value = '';
  
  // Reset all permissions to checked
  ['quotes', 'orders', 'invoices', 'customers', 'products', 'reports'].forEach(perm => {
    const checkbox = document.getElementById(`perm-${perm}`);
    if (checkbox) checkbox.checked = true;
  });
  
  document.getElementById('userModal').classList.add('open');
}

function editUser(userId) {
  const user = users.find(u => u.id === userId);
  if (!user) return;
  
  document.getElementById('userModalTitle').textContent = 'Chỉnh sửa người dùng';
  document.getElementById('editUserId').value = user.id;
  document.getElementById('userName').value = user.name;
  document.getElementById('userEmail').value = user.email;
  document.getElementById('userPhone').value = user.phone;
  document.getElementById('userRole').value = user.role;
  document.getElementById('userPassword').value = '';
  document.getElementById('userPassword').placeholder = 'Để trống nếu không đổi mật khẩu';
  
  // Set permissions
  ['quotes', 'orders', 'invoices', 'customers', 'products', 'reports'].forEach(perm => {
    const checkbox = document.getElementById(`perm-${perm}`);
    if (checkbox) checkbox.checked = user.permissions.includes(perm);
  });
  
  document.getElementById('userModal').classList.add('open');
}

function closeUserModal() {
  document.getElementById('userModal').classList.remove('open');
  document.getElementById('userPassword').placeholder = 'Nhập mật khẩu (tối thiểu 6 ký tự)';
}

function saveUser() {
  const userId = document.getElementById('editUserId').value;
  const name = document.getElementById('userName').value.trim();
  const email = document.getElementById('userEmail').value.trim();
  const phone = document.getElementById('userPhone').value.trim();
  const role = document.getElementById('userRole').value;
  const password = document.getElementById('userPassword').value;
  
  // Validate
  if (!name || !email || !phone) {
    alert('Vui lòng điền đầy đủ thông tin!');
    return;
  }
  
  // Validate email format
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    alert('Email không hợp lệ!');
    return;
  }
  
  // Check password for new user
  if (!userId && (!password || password.length < 6)) {
    alert('Mật khẩu phải có ít nhất 6 ký tự!');
    return;
  }
  
  // Check password for edit if provided
  if (userId && password && password.length < 6) {
    alert('Mật khẩu phải có ít nhất 6 ký tự!');
    return;
  }
  
  // Get permissions
  const permissions = [];
  ['quotes', 'orders', 'invoices', 'customers', 'products', 'reports'].forEach(perm => {
    const checkbox = document.getElementById(`perm-${perm}`);
    if (checkbox && checkbox.checked) permissions.push(perm);
  });
  
  if (userId) {
    // Edit existing user
    const userIndex = users.findIndex(u => u.id === parseInt(userId));
    if (userIndex !== -1) {
      users[userIndex] = {
        ...users[userIndex],
        name,
        email,
        phone,
        role,
        permissions
      };
      showToast('✓ Người dùng đã được cập nhật!');
    }
  } else {
    // Add new user
    const newUser = {
      id: Math.max(...users.map(u => u.id)) + 1,
      name,
      email,
      phone,
      role,
      permissions
    };
    users.push(newUser);
    showToast('✓ Người dùng mới đã được thêm!');
  }
  
  renderUserList();
  closeUserModal();
}

function deleteUser(userId) {
  const user = users.find(u => u.id === userId);
  if (!user) return;
  
  if (confirm(`Bạn có chắc muốn xóa người dùng "${user.name}"?`)) {
    users = users.filter(u => u.id !== userId);
    renderUserList();
    showToast('✓ Người dùng đã được xóa!');
  }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
  initUserManagement();
});
</script>
</body>
</html>
